name: Update SNOTEL county data

# Runs update_snotel.py every morning and commits any refreshed
# county JSON files back to main. This replaces the stale
# 2026-04-11 "auto update" placeholder with live NRCS data.

on:
  schedule:
    # 11:30 UTC = ~05:30 Mountain (after NRCS daily roll-up)
    - cron: '30 11 * * *'
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SNOTEL updater
        run: python update_snotel.py --out . --verbose

      - name: Commit updated county files
        run: |
          git config user.name "snotel-bot"
          git config user.email "snotel-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain '*.json')" ]]; then
            git add *.json
            git commit -m "auto update: SNOTEL refresh $(date -u +%Y-%m-%d)"
            # Rebase onto any commits that landed while the updater ran
            # (handles concurrent pushes during the ~6 min run window)
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit."
          fi
